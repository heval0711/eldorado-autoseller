<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldorado Auto-Seller | Steal a Brainrot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Particles -->
    <div class="particles"></div>

    <!-- Main Container -->
    <div class="container">
        
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="url(#gradient)"/>
                    <path d="M20 10L30 20L20 30L10 20L20 10Z" fill="white"/>
                    <defs>
                        <linearGradient id="gradient" x1="0" y1="0" x2="40" y2="40">
                            <stop offset="0%" style="stop-color:#8B5CF6"/>
                            <stop offset="100%" style="stop-color:#EC4899"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h1>Eldorado Auto-Seller</h1>
            </div>
            <div class="user-info" id="userInfo" style="display: none;">
                <span id="userEmail"></span>
                <button class="btn-logout" id="logoutBtn">Logout</button>
            </div>
        </header>

        <!-- Login Section -->
        <section class="login-section" id="loginSection">
            <div class="login-card">
                <h2>🔐 Eldorado Login</h2>
                <p class="subtitle">Melde dich mit deinem Eldorado.gg Account an</p>
                
                <form id="loginForm" class="login-form">
                    <div class="input-group">
                        <label for="email">E-Mail</label>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="deine@email.com" 
                            required
                        >
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Passwort</label>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="••••••••" 
                            required
                        >
                    </div>
                    
                    <button type="submit" class="btn-primary" id="loginBtn">
                        <span>Login</span>
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M5 10H15M15 10L10 5M15 10L10 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                </form>
                
                <div class="login-status" id="loginStatus"></div>
            </div>
        </section>

        <!-- Main App Section -->
        <section class="app-section" id="appSection" style="display: none;">
            
            <!-- Scanner Input -->
            <div class="card">
                <div class="card-header">
                    <h2>📋 Scanner JSON Input</h2>
                    <button class="btn-help" title="Hilfe">?</button>
                </div>
                <div class="card-body">
                    <p class="help-text">
                        Füge hier die JSON-Daten vom Roblox Scanner ein
                    </p>
                    
                    <div class="json-input-container">
                        <textarea 
                            id="jsonInput" 
                            placeholder='[{"name":"Divine Brainrot","ms":"10 M/s","mutation":"Divine","rarity":"Secret"}]'
                            rows="8"
                        ></textarea>
                        
                        <div class="input-actions">
                            <button class="btn-secondary" id="quickFillBtn">
                                ⚡ Quick Fill (Test)
                            </button>
                            <button class="btn-primary" id="parseBtn">
                                <span>Parse Items</span>
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                    <path d="M3 8H13M13 8L8 3M13 8L8 13" stroke="currentColor" stroke-width="2"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <div class="parse-status" id="parseStatus"></div>
                </div>
            </div>

            <!-- Items List -->
            <div class="card" id="itemsCard" style="display: none;">
                <div class="card-header">
                    <h2>🎯 Deine Items (<span id="itemCount">0</span>)</h2>
                    <div class="header-actions">
                        <button class="btn-secondary" id="fetchPricesBtn">
                            🔄 Preise Holen
                        </button>
                        <button class="btn-success" id="autoListBtn" disabled>
                            ✨ Auto-List Selected
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="items-container" id="itemsContainer">
                        <!-- Items werden hier eingefügt -->
                    </div>
                </div>
            </div>

            <!-- Progress Section -->
            <div class="card" id="progressCard" style="display: none;">
                <div class="card-header">
                    <h2>📊 Upload Progress</h2>
                </div>
                <div class="card-body">
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                        </div>
                        <div class="progress-text" id="progressText">0 / 0 Items</div>
                    </div>
                    
                    <div class="progress-logs" id="progressLogs">
                        <!-- Logs werden hier eingefügt -->
                    </div>
                </div>
            </div>

        </section>

    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
